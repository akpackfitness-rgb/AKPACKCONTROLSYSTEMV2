<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Pack Fitness — Check In</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .numpad-page {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Background glow */
  .bg-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .bg-glow.entry { background: var(--accent-green); }
  .bg-glow.exit { background: var(--accent-red); }

  /* TOP NAV */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
    background: none;
    border: none;
    cursor: pointer;
  }

  .back-btn:hover { color: var(--text-primary); }

  /* MODE BADGE */
  .mode-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 30px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.12em;
  }

  .mode-badge.entry {
    background: rgba(0,200,150,0.15);
    border: 1px solid rgba(0,200,150,0.3);
    color: var(--accent-green);
    box-shadow: 0 0 20px rgba(0,200,150,0.15);
  }

  .mode-badge.exit {
    background: rgba(224,48,48,0.15);
    border: 1px solid rgba(224,48,48,0.3);
    color: var(--accent-red);
    box-shadow: 0 0 20px rgba(224,48,48,0.15);
  }

  /* DISPLAY */
  .id-display {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .id-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .id-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 0.15em;
    line-height: 1;
    min-height: 48px;
    transition: color 0.2s;
  }

  .id-value.has-value.entry { color: var(--accent-green); }
  .id-value.has-value.exit { color: var(--accent-red); }
  .id-value:not(.has-value) { color: var(--text-muted); }

  .id-cursor {
    display: inline-block;
    width: 3px;
    height: 40px;
    background: var(--text-muted);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* NUMPAD */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .num-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.05em;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 64px;
    user-select: none;
  }

  .num-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
    transform: scale(1.04);
  }

  .num-btn:active {
    transform: scale(0.95);
    background: var(--bg-secondary);
  }

  .num-btn.backspace {
    font-size: 20px;
    color: var(--text-secondary);
  }

  .num-btn.confirm {
    font-size: 22px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .num-btn.confirm.entry {
    background: rgba(0,200,150,0.15);
    border-color: rgba(0,200,150,0.3);
    color: var(--accent-green);
  }

  .num-btn.confirm.entry:hover {
    background: var(--accent-green);
    color: #000;
    box-shadow: 0 0 20px rgba(0,200,150,0.4);
  }

  .num-btn.confirm.exit {
    background: rgba(224,48,48,0.15);
    border-color: rgba(224,48,48,0.3);
    color: var(--accent-red);
  }

  .num-btn.confirm.exit:hover {
    background: var(--accent-red);
    color: white;
    box-shadow: 0 0 20px rgba(224,48,48,0.4);
  }

  /* ERROR SHAKE */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* LOADING */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(11,15,30,0.8);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .loading-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  @media (max-width: 600px) {
    .numpad-page { padding: 16px; max-width: 100%; }
    .num-btn { min-height: 56px; font-size: 24px; }
    .id-value { font-size: 40px; }
  }
</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>

<div class="numpad-page">
  <!-- TOP NAV -->
  <div class="top-nav">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="mode-badge" id="modeBadge">✅ ENTRY</div>
  </div>

  <!-- ID DISPLAY -->
  <div class="id-display">
    <div class="id-label">Enter Member ID</div>
    <div class="id-value" id="idDisplay">
      <span class="id-cursor"></span>
    </div>
  </div>

  <!-- NUMPAD -->
  <div class="numpad">
    <button class="num-btn" onclick="addDigit('1')">1</button>
    <button class="num-btn" onclick="addDigit('2')">2</button>
    <button class="num-btn" onclick="addDigit('3')">3</button>
    <button class="num-btn" onclick="addDigit('4')">4</button>
    <button class="num-btn" onclick="addDigit('5')">5</button>
    <button class="num-btn" onclick="addDigit('6')">6</button>
    <button class="num-btn" onclick="addDigit('7')">7</button>
    <button class="num-btn" onclick="addDigit('8')">8</button>
    <button class="num-btn" onclick="addDigit('9')">9</button>
    <button class="num-btn backspace" onclick="deleteDigit()">⌫</button>
    <button class="num-btn" onclick="addDigit('0')">0</button>
    <button class="num-btn confirm" id="confirmBtn" onclick="confirmEntry()">✓ GO</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Looking up member...</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode') || 'entry';
  let enteredId = '';

  // Set mode UI
  const badge = document.getElementById('modeBadge');
  const confirmBtn = document.getElementById('confirmBtn');
  const bgGlow = document.getElementById('bgGlow');

  if (mode === 'exit') {
    badge.textContent = '🚪 EXIT';
    badge.className = 'mode-badge exit';
    confirmBtn.classList.add('exit');
    bgGlow.classList.add('exit');
  } else {
    badge.textContent = '✅ ENTRY';
    badge.className = 'mode-badge entry';
    confirmBtn.classList.add('entry');
    bgGlow.classList.add('entry');
  }

  function updateDisplay() {
    const el = document.getElementById('idDisplay');
    if (enteredId) {
      el.innerHTML = enteredId;
      el.className = `id-value has-value ${mode}`;
    } else {
      el.innerHTML = '<span class="id-cursor"></span>';
      el.className = 'id-value';
    }
  }

  function addDigit(d) {
    if (enteredId.length >= 6) return;
    enteredId += d;
    updateDisplay();
    // Haptic if supported
    if (navigator.vibrate) navigator.vibrate(10);
  }

  function deleteDigit() {
    enteredId = enteredId.slice(0, -1);
    updateDisplay();
  }

  function confirmEntry() {
    if (!enteredId) {
      const display = document.getElementById('idDisplay');
      display.classList.add('shake');
      setTimeout(() => display.classList.remove('shake'), 400);
      showToast('Please enter a Member ID', 'error');
      return;
    }
    // Save mode and ID, go to member page
    sessionStorage.setItem('ak_member_id', enteredId);
    sessionStorage.setItem('ak_mode', mode);
    document.getElementById('loadingOverlay').classList.add('show');
    setTimeout(() => {
      window.location.href = `member.html`;
    }, 800);
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') addDigit(e.key);
    else if (e.key === 'Backspace') deleteDigit();
    else if (e.key === 'Enter') confirmEntry();
  });

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }
</script>
</body>
</html>
